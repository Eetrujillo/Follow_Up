<div class="auth-container">
  <div class="auth-card">

    <div class="auth-header">
      <h1 class="auth-logo">Follow-up</h1>
      <p class="auth-subtitle">Crea tu cuenta para empezar</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="name">Nombre completo</label>
        <input
          id="name"
          type="text"
          placeholder="Tu nombre"
          [(ngModel)]="name"
          name="name"
          (input)="clearError('name')"
        />
        <div class="field-error" *ngIf="submitted && errors.name">
          <small>{{ errors.name }}</small>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          placeholder="correo@ejemplo.com"
          [(ngModel)]="email"
          name="email"
          (input)="clearError('email')"
        />
        <div class="field-error" *ngIf="submitted && errors.email">
          <small>{{ errors.email }}</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          placeholder="Mínimo 8 caracteres"
          [(ngModel)]="password"
          name="password"
          (input)="clearError('password')"
        />
        <div class="field-error" *ngIf="submitted && errors.password">
          <small>{{ errors.password }}</small>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm">Confirmar contraseña</label>
        <input
          id="confirm"
          type="password"
          placeholder="Repite tu contraseña"
          [(ngModel)]="confirm"
          name="confirm"
          (input)="clearError('confirm')"
        />
        <div class="field-error" *ngIf="submitted && errors.confirm">
          <small>{{ errors.confirm }}</small>
        </div>
      </div>

      <button type="submit" class="btn-primary">Crear cuenta</button>

    </form>

    <p class="auth-redirect">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>

  </div>
</div>
