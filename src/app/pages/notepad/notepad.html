<div class="page-wrapper">

  <div class="breadcrumb">
    <span>Follow-up</span>
    <span class="sep">›</span>
    <span>Bloc de Notas</span>
  </div>

  <div class="page-header">
    <div>
      <h1>Bloc de Notas</h1>
      <p class="subtitle">Tu espacio personal.</p>
    </div>
    <div class="header-actions">
      <span class="saved-msg" *ngIf="saved">Guardado en biblioteca</span>
      <button class="btn-library"
              (click)="openSaveModal()"
              [disabled]="!hasContent">
        Guardar en Biblioteca
      </button>
    </div>
  </div>

  <div class="editor-container">

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="tool-btn" (click)="format('bold')"
              [class.active]="isActive('bold')"
              title="Negrita">
        <strong>B</strong>
      </button>
      <button class="tool-btn" (click)="format('italic')"
              [class.active]="isActive('italic')"
              title="Cursiva">
        <em>I</em>
      </button>
      <button class="tool-btn" (click)="format('underline')"
              [class.active]="isActive('underline')"
              title="Subrayado">
        <u>U</u>
      </button>
      <div class="divider"></div>
      <button class="tool-btn" (click)="format('insertUnorderedList')"
              title="Lista">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6"  x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6"  x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
      <div class="divider"></div>
      <!-- Selector de tamaño -->
      <button class="tool-btn" (click)="format('fontSize', '4')" title="Grande">
        <span style="font-size:15px">A</span>
      </button>
      <button class="tool-btn" (click)="format('fontSize', '2')" title="Normal">
        <span style="font-size:11px">A</span>
      </button>
    </div>

    <div
      #editor
      class="editor"
      contenteditable="true"
      (input)="onContentChange()"
      (keyup)="onSelectionChange()"
      (mouseup)="onSelectionChange()"
      [attr.data-placeholder]="'Empieza a escribir aqui...'">
    </div>

  </div>

  <div class="modal-overlay" *ngIf="showSaveModal" (click)="showSaveModal = false">
    <div class="modal" (click)="$event.stopPropagation()">
      <h3>Guardar en Biblioteca</h3>
      <p class="modal-sub">La nota se guardara en la carpeta "Mis Notas"</p>
      <input type="text"
             placeholder="Nombre de la nota"
             [(ngModel)]="noteName"
             (keyup.enter)="saveToLibrary()" />
      <div class="modal-actions">
        <button class="btn-cancel" (click)="showSaveModal = false">Cancelar</button>
        <button class="btn-save"   (click)="saveToLibrary()">Guardar</button>
      </div>
    </div>
  </div>

</div>
