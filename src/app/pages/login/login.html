<div class="auth-container">
  <div class="auth-card">

    <div class="auth-header">
      <h1 class="auth-logo">Follow-up</h1>
      <p class="auth-subtitle">Inicia sesión en tu cuenta</p>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      <small>{{ errorMessage }}</small>
    </div>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          placeholder="correo@ejemplo.com"
          formControlName="email"
        />
        <div class="field-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <small *ngIf="loginForm.get('email')?.errors?.['required']">Ingresa tu correo electrónico</small>
          <small *ngIf="loginForm.get('email')?.errors?.['email']">Ingresa un correo válido</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          placeholder="Tu contraseña"
          formControlName="password"
        />
        <div class="field-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <small *ngIf="loginForm.get('password')?.errors?.['required']">Ingresa tu contraseña</small>
        </div>
      </div>

      <button type="submit" class="btn-primary">Iniciar sesión</button>

    </form>

    <p class="auth-redirect">
      ¿No tienes cuenta?
      <a routerLink="/signup">Regístrate</a>
    </p>

  </div>
</div>
