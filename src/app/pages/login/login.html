<div class="auth-container">
  <div class="auth-card">

    <div class="auth-header">
      <h1 class="auth-logo">Follow-up</h1>
      <p class="auth-subtitle">Inicia sesión para continuar</p>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      <small>{{ errorMessage }}</small>
    </div>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          placeholder="usuario@gmail.com"
          formControlName="email"
        />
        <div class="field-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <small *ngIf="loginForm.get('email')?.errors?.['required']">Por favor, ingresa tu correo</small>
          <small *ngIf="loginForm.get('email')?.errors?.['email']">Este correo no parece válido</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="verPassword ? 'text' : 'password'"
            placeholder="12345678"
            formControlName="password"
          />
          <span class="ojo" (click)="toggleOjo()">
            {{ verPassword ? '👁️‍🗨️' : '👁️' }}
          </span>
        </div>
        <div class="field-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <small *ngIf="loginForm.get('password')?.errors?.['required']">Se necesita tu contraseña para entrar</small>
          <small *ngIf="loginForm.get('password')?.errors?.['minlength']">La contraseña debe tener mínimo 8 caracteres</small>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Validando la información' : 'Iniciar sesión' }}
      </button>

    </form>

    <p class="auth-redirect">
      No tienes cuenta?
      <a routerLink="/signup">Regístrate</a>
    </p>

  </div>
</div>
