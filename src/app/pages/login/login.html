<div class="login-wrapper">
  <div class="login-container">

    <div class="logo-box">
      @defer { ⚡ }
    </div>
    <h1 class="titulo">Follow-up</h1>
    <p class="subtitulo">Inicia sesion para continuar</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="campo">
        <label>Correo electronico</label>
        <input
          type="email"
          placeholder="usuario@gmail.com"
          formControlName="email"
          [class.input-error]="email?.invalid && email?.touched" />

        <span class="error" *ngIf="email?.touched && email?.hasError('required')">
          El correo es obligatorio
        </span>
        <span class="error" *ngIf="email?.touched && email?.hasError('email')">
          Ingresa un correo valido
        </span>
      </div>

      <div class="campo">
        <label>Contraseña</label>
        <div class="password-wrapper">
          <input
            [type]="verPassword ? 'text' : 'password'"
            placeholder="Mínimo 8 caracteres"
            formControlName="password"
            [class.input-error]="password?.invalid && password?.touched" />
          
          <span class="ojo" (click)="toggleOjo()">
            <svg *ngIf="verPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="!verPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </span>
        </div>

        <span class="error" *ngIf="password?.touched && password?.hasError('required')">
          La contraseña es obligatoria
        </span>
        <span class="error" *ngIf="password?.touched && password?.hasError('minlength')">
          Minimo 8 caracteres
        </span>
      </div>

      <div class="error-box" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar sesion</span>
        <span *ngIf="isLoading">Cargando...</span>
      </button>

    </form>

    <p class="pie">
      ¿No tienes cuenta?
      <span class="registro-link" routerLink="/signup">Registrate</span>
    </p>

  </div>
</div>
