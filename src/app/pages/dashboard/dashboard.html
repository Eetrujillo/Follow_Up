<div class="dashboard-wrapper">

  <header class="main-header">
    <p class="breadcrumb">Follow-up › <span>Panel Principal</span></p>
    <h1>Panel Principal</h1>
  </header>

  <div class="dashboard-grid">

    <!-- PROCESO DIARIO -->
    <section class="card card-progress">
      <h3 class="card-title">PROCESO DIARIO</h3>
      <div class="donut-wrap">
        <canvas #donutCanvas></canvas>
        <div class="donut-center">
          <strong>{{ progressPercent }}%</strong>
          <span>Completado</span>
        </div>
      </div>
    </section>

    <!-- ACTIVIDAD SEMANAL -->
    <section class="card card-weekly">
      <h3 class="card-title">ACTIVIDAD SEMANAL</h3>
      <div class="bar-wrap">
        <canvas #barCanvas></canvas>
      </div>
    </section>

    <!-- TAREAS PENDIENTES -->
    <section class="card card-tasks">
      <h3 class="card-title">TAREAS PENDIENTES</h3>

      <div class="add-task-box">
        <input
          [(ngModel)]="newTaskText"
          (keyup.enter)="addTask()"
          placeholder="Nueva tarea..." />
        <button (click)="addTask()">+</button>
      </div>

      <div class="task-list">
        <div class="task-item"
             *ngFor="let task of tasks"
             [class.completed]="task.completed">
          <input type="checkbox"
                 [(ngModel)]="task.completed"
                 (ngModelChange)="onTaskChange()" />
          <span>{{ task.text }}</span>
          <button class="del-btn" (click)="deleteTask(task.id)">x</button>
        </div>
      </div>
    </section>

    <!-- ACTIVIDAD RECIENTE -->
    <section class="card card-recent">
      <h3 class="card-title">ACTIVIDAD RECIENTE</h3>
      <div class="activity-list">
        <div class="activity-item" *ngFor="let act of activities">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span class="act-name">{{ act.title }}</span>
          <span class="act-time">{{ act.time }}</span>
        </div>
      </div>
    </section>

    <!-- ZONA DE ENFOQUE -->
    <section class="card card-focus">
      <h3 class="card-title">ZONA DE ENFOQUE</h3>
      <div class="timer-content">

        <div class="timer-status">
          <span class="dot" [class.pulse]="isRunning"></span>
          {{ statusText }}
        </div>

        <div class="timer-digits">{{ formatTime() }}</div>

        <div class="timer-actions">
          <button class="btn-round main" (click)="toggleTimer()">
            <svg *ngIf="!isRunning" width="14" height="14" viewBox="0 0 24 24" fill="white">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <svg *ngIf="isRunning" width="14" height="14" viewBox="0 0 24 24" fill="white">
              <rect x="6" y="4" width="4" height="16"/>
              <rect x="14" y="4" width="4" height="16"/>
            </svg>
          </button>
          <button class="btn-round" (click)="stopTimer()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 .49-5"/>
            </svg>
          </button>
        </div>

      </div>
    </section>

  </div>
</div>
